{% extends "base.html" %}
{% block title %}New Visitor - Digibook-X{% endblock %}
{% block content %}
<h1 class="h1">New Visitor Check-in</h1>
<form method="POST" class="card">
  <div class="row">
    <div class="col"><label>Name</label><input class="input" name="full_name" required></div>
    <div class="col"><label>Phone</label><input class="input" name="phone" required></div>
    <div class="col"><label>National ID Number</label><input class="input" name="national_id" required></div>
  </div>
  <div class="row">
    <div class="col">
      <label>Office/Department To Visit</label>
      <select name="unit_id" required>
        <option value="">-- select office/department --</option>
        {% for u in units %}<option value="{{ u.id }}">{{ u.name }}</option>{% endfor %}
      </select>
    </div>
    <div class="col">
      <label>Purpose</label>
      <select name="purpose_id" required>
        <option value="">-- select purpose --</option>
        {% for p in purposes %}<option value="{{ p.id }}">{{ p.name }}</option>{% endfor %}
      </select>
    </div>
  </div>
  <div class="row">
    <div class="col"><label>Vehicle Plate (optional)</label><input class="input" name="vehicle_reg" placeholder="e.g. KDA 234A"></div>
    <div class="col"><label>Vehicle Type (optional)</label><input class="input" name="vehicle_type" placeholder="e.g. Car, SUV, Motorbike"></div>
  </div>
  <div class="form-actions">
    <button class="btn primary">Save & Check-in</button>
    <a class="btn" href="{{ url_for('visitors_list') }}">Cancel</a>
  </div>
</form>
{% endblock %}
