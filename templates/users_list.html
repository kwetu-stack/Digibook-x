{% extends "base.html" %}
{% block title %}Users · Digibook‑X{% endblock %}
{% block content %}
<div class="row" style="align-items:center">
  <h1 class="h1" style="flex:1">Users</h1>
  <a class="btn primary" href="{{ url_for('user_new') }}">New User</a>
</div>
<div class="card">
  <table class="table">
    <tr><th>Name</th><th>Username</th><th>Role</th><th>Active</th><th></th></tr>
    {% for u in items %}
    <tr>
      <td>{{ u.name }}</td><td>{{ u.username }}</td><td>{{ u.role }}</td><td>{{ 'Yes' if u.active else 'No' }}</td>
      <td><a class="btn small" href="{{ url_for('user_edit', id=u.id) }}">Edit</a></td>
    </tr>
    {% endfor %}
  </table>
</div>
{% endblock %}
