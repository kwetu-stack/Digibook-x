{% extends "base.html" %}
{% block title %}Edit Visitor - Digibook-X{% endblock %}
{% block content %}
<h1 class="h1">Edit Visitor</h1>
<form method="POST" class="card">
  <div class="row">
    <div class="col"><label>Name</label><input class="input" name="full_name" value="{{ v.full_name }}" required></div>
    <div class="col"><label>Phone</label><input class="input" name="phone" value="{{ v.phone }}" required></div>
    <div class="col"><label>National ID Number</label><input class="input" name="national_id" value="{{ v.national_id or v.id_number or '' }}" required></div>
  </div>
  <div class="row">
    <div class="col">
      <label>Office/Department To Visit</label>
      <select name="unit_id" required>
        <option value="">-- select office/department --</option>
        {% for u in units %}<option value="{{ u.id }}" {{ 'selected' if v.unit_id==u.id else '' }}>{{ u.name }}</option>{% endfor %}
      </select>
    </div>
    <div class="col">
      <label>Purpose</label>
      <select name="purpose_id" required>
        <option value="">-- select purpose --</option>
        {% for p in purposes %}<option value="{{ p.id }}" {{ 'selected' if v.purpose_id==p.id else '' }}>{{ p.name }}</option>{% endfor %}
      </select>
    </div>
  </div>
  <div class="row">
    <div class="col"><label>Vehicle Plate (optional)</label><input class="input" name="vehicle_reg" value="{{ v.vehicle_reg or '' }}" placeholder="e.g. KDA 234A"></div>
    <div class="col"><label>Vehicle Type (optional)</label><input class="input" name="vehicle_type" value="{{ v.vehicle_type or '' }}" placeholder="e.g. Car, SUV, Motorbike"></div>
  </div>
  <div class="form-actions">
    <button class="btn primary">Save Changes</button>
    <a class="btn" href="{{ url_for('visitors_list') }}">Cancel</a>
  </div>
</form>

<div class="card">
  <div class="form-actions">
    {% if not v.checkout_time %}
      <form method="POST" action="{{ url_for('visitor_checkout', id=v.id) }}">
        <button class="btn">Check-out</button>
      </form>
    {% else %}
      <span class="badge out">Checked-out at {{ v.checkout_time.strftime('%Y-%m-%d %H:%M') }}</span>
    {% endif %}
    {% if is_demo() %}
      <button class="btn danger" disabled title="Disabled in demo mode">Delete</button>
    {% else %}
      <form method="POST" action="{{ url_for('visitor_delete', id=v.id) }}" onsubmit="return confirm('Delete this record?')">
        <button class="btn danger">Delete</button>
      </form>
    {% endif %}
  </div>
</div>
{% endblock %}
