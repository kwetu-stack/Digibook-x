{% extends "base.html" %}
{% block title %}Dashboard - Digibook-X{% endblock %}
{% block content %}
<h1 class="h1">Welcome to Digibook-X</h1>
<p class="h2">Use Visitors page to manage entries.</p>
<div class="grid cols-3">
  <div class="card">
    <div class="h2">Today Check-ins</div>
    <div style="font-size:2rem;font-weight:700">{{ tiles.today }}</div>
  </div>
  <div class="card">
    <div class="h2">Currently Inside</div>
    <div style="font-size:2rem;font-weight:700">{{ tiles.inside }}</div>
  </div>
  <div class="card">
    <div class="h2">This Month Visits</div>
    <div style="font-size:2rem;font-weight:700">{{ tiles.month }}</div>
  </div>
</div>
{% endblock %}
