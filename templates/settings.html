{% extends "base.html" %}
{% block title %}Settings · Digibook‑X{% endblock %}
{% block content %}
<h1 class="h1">Settings</h1>
<form method="POST" enctype="multipart/form-data" class="card" style="max-width:700px">
  <div class="row">
    <div class="col"><label>Site Name</label><input class="input" name="site_name" value="{{ s.site_name or '' }}"></div>
    <div class="col"><label>Badge Footer Text</label><input class="input" name="badge_footer" value="{{ s.badge_footer or '' }}"></div>
  </div>
  <div class="row">
    <div class="col">
      <label>Logo (optional)</label>
      <input type="file" name="logo" accept="image/*">
    </div>
  </div>
  <div class="form-actions">
    <button class="btn primary">Save</button>
  </div>
</form>
{% endblock %}
